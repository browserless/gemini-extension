description = "Search the web using Browserless. Returns structured results from web, news, and image sources."

prompt = """# Search

Use the Browserless `/search` REST API to perform web searches and get structured results.

The user's request is: {{args}}

## Authentication

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
API_URL="${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}"
```

If no token is available, ask the user to run `/browserless:auth`.

## How to call

```
POST ${API_URL}/search?token=${BROWSERLESS_TOKEN}
Content-Type: application/json
```

### Request body

```json
{
  "query": "<search query>",
  "sources": ["web"],
  "limit": 10,
  "lang": "en"
}
```

#### Parameters:

- `query` (string, required): The search query.
- `sources` (array): `"web"`, `"news"`, `"images"`. Default: `["web"]`.
- `limit` (number): Max results to return.
- `lang` (string): Language code — `"en"`, `"es"`, `"de"`, `"fr"`, `"ja"`, etc.
- `location` (string): Location context.
- `country` (string): Country context.
- `tbs` (string): Time filter — `"day"`, `"week"`, `"month"`, `"year"`.
- `categories` (array): `"github"`, `"pdf"`, `"research"`.

#### `scrapeOptions` (object) — Scrape each result page:

- `formats` (array): `"markdown"`, `"html"`, `"links"`, `"screenshot"`.
- `onlyMainContent` (boolean): Extract main content only.
- `includeTags` / `excludeTags` (arrays): HTML tag filters.

### Response

```json
{
  "success": true,
  "data": {
    "web": [
      {
        "title": "Result Title",
        "url": "https://example.com",
        "description": "Result description.",
        "position": 1
      }
    ]
  },
  "totalResults": 10
}
```

## Execution

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/search?token=$BROWSERLESS_TOKEN" \\
  -H "Content-Type: application/json" \\
  -d '{"query": "browserless headless browser", "sources": ["web"], "limit": 10}'
```

Present results in a readable format. If the user wants to deep-dive into a result, suggest using `/browserless:smart-scrape` to fetch that page.
"""
