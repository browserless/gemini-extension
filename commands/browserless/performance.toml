description = "Run a Lighthouse performance audit on any URL. Returns scores and metrics for performance, accessibility, SEO, best practices, and PWA."

prompt = """# Performance

Use the Browserless `/performance` REST API to run a Lighthouse audit on any URL. Returns scores and detailed metrics for accessibility, best practices, performance, PWA, and SEO.

The user's request is: {{args}}

## Authentication

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
API_URL="${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}"
```

If no token is available, ask the user to run `/browserless:auth`.

## How to call

```
POST ${API_URL}/performance?token=${BROWSERLESS_TOKEN}
Content-Type: application/json
```

### Request body

```json
{
  "url": "https://example.com",
  "config": {
    "extends": "lighthouse:default",
    "settings": {
      "onlyCategories": ["performance", "accessibility", "seo"]
    }
  }
}
```

#### Parameters:

- `url` (string, required): The URL to audit.
- `config` (object, optional): Lighthouse configuration:
  - `extends` (string): Base config, typically `"lighthouse:default"`.
  - `settings` (object):
    - `onlyCategories` (array): Limit to specific categories — `"accessibility"`, `"best-practices"`, `"performance"`, `"pwa"`, `"seo"`. Omit to run all categories.
    - `onlyAudits` (array): Run only specific audits by name (e.g., `"unminified-css"`, `"first-contentful-paint"`, `"uses-responsive-images"`).

### Response

JSON with audit results:

```json
{
  "data": [
    {
      "lighthouseVersion": "12.x.x",
      "requestedUrl": "https://example.com",
      "categories": {
        "performance": { "score": 0.95 },
        "accessibility": { "score": 0.88 }
      },
      "audits": {
        "first-contentful-paint": {
          "title": "First Contentful Paint",
          "score": 1,
          "displayValue": "0.8 s"
        }
      }
    }
  ]
}
```

Scores range from 0 to 1 (multiply by 100 for percentage).

## Execution

**Important:** Performance audits can take several seconds to minutes depending on the site. Use a longer timeout.

### Full audit (all categories):

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/performance?token=$BROWSERLESS_TOKEN" \
  -H "Content-Type: application/json" \
  -d '{"url": "https://example.com"}'
```

### Specific categories only (recommended — full audits return very large responses):

```bash
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/performance?token=$BROWSERLESS_TOKEN" \
  -H "Content-Type: application/json" \
  -d '{"url": "https://example.com", "config": {"extends": "lighthouse:default", "settings": {"onlyCategories": ["performance", "seo"]}}}'
```

### Single audit:

```bash
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/performance?token=$BROWSERLESS_TOKEN" \
  -H "Content-Type: application/json" \
  -d '{"url": "https://example.com", "config": {"extends": "lighthouse:default", "settings": {"onlyAudits": ["first-contentful-paint"]}}}'
```

Tips:
- Default to specific categories rather than a full audit — full responses can be 350–800KB of JSON.
- Present scores as percentages (score * 100) for readability.
- Group results by category when presenting to the user.
- If the user just says "audit" or "check performance", default to `["performance", "accessibility", "seo", "best-practices"]`.
"""
