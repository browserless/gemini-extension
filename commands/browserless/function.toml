description = "Execute custom Puppeteer JavaScript code on Browserless cloud for complex browser automation."

prompt = """# Function

Use the Browserless `/function` REST API to execute custom Puppeteer JavaScript code in a cloud browser.

The user's request is: {{args}}

## Authentication

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
API_URL="${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}"
```

If no token is available, ask the user to run `/browserless:auth`.

## How to call

### Option 1: JavaScript body (Content-Type: application/javascript)

```
POST ${API_URL}/function?token=${BROWSERLESS_TOKEN}
Content-Type: application/javascript
```

Send raw JavaScript code. The function receives `page` (Puppeteer Page) and optional `context`, and must return `{ data, type }`:

```javascript
export default async ({ page, context }) => {
  await page.goto("https://example.com");
  const title = await page.title();
  return {
    data: { title },
    type: "application/json"
  };
};
```

### Option 2: JSON body (Content-Type: application/json)

```json
{
  "code": "export default async ({ page, context }) => { ... };",
  "context": { "url": "https://example.com" }
}
```

- `code` (string, required): ESM JavaScript with default async export receiving `{ page, context }` returning `{ data, type }`.
- `context` (object, optional): Data passed into the function.

### Return value

- `data`: Buffer, JSON object, or plain text string.
- `type`: Content-Type string (`"application/json"`, `"text/plain"`, `"image/png"`, etc.).

## Execution

For simple scripts, use `application/javascript`:

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/function?token=$BROWSERLESS_TOKEN" \\
  -H "Content-Type: application/javascript" \\
  -d 'export default async ({ page }) => {
  await page.goto("https://example.com");
  const title = await page.title();
  return { data: { title }, type: "application/json" };
};'
```

Write Puppeteer code based on the user's requirements. Use best practices: wait for selectors before interacting, handle navigation events, return structured data.
"""
