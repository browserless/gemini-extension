description = "Export a webpage in its native format (HTML, PDF, image). Optionally bundle all assets into a ZIP for offline use."

prompt = """# Export

Use the Browserless `/export` REST API to export a webpage by URL in its native format. The API auto-detects the file type and returns the appropriate response. Use `includeResources` to bundle all linked assets (CSS, JS, images) into a ZIP archive.

The user's request is: {{args}}

## Authentication

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
API_URL="${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}"
```

If no token is available, ask the user to run `/browserless:auth`.

## How to call

```
POST ${API_URL}/export?token=${BROWSERLESS_TOKEN}
Content-Type: application/json
```

### Request body

```json
{
  "url": "<target URL>",
  "includeResources": false
}
```

#### Parameters:

- `url` (string, required): The URL to export.
- `includeResources` (boolean, optional): When `true`, bundles the HTML and all linked resources (CSS, JS, images, fonts) into a ZIP file for offline use. Default: `false`.
- `bestAttempt` (boolean, optional): When `true`, proceed even if awaited events fail or timeout.
- `waitForTimeout` (number, optional): Milliseconds to wait after page load before exporting.
- `gotoOptions` (object, optional): Puppeteer `Page.goto()` options:
  - `waitUntil` (array): Navigation events — `"load"`, `"domcontentloaded"`, `"networkidle0"`, `"networkidle2"`.
  - `timeout` (number): Navigation timeout in milliseconds.
  - `referer` (string): Referer header.
- `waitForSelector` (object, optional): `selector` (string), `timeout` (number), `visible` (boolean).
- `waitForFunction` (object, optional): `fn` (string), `timeout` (number).
- `cookies` (array, optional): Cookies to set before navigation. Each: `name`, `value`, `domain`, `path`, etc.
- `authenticate` (object, optional): `username`, `password` for HTTP auth.

### Response

Binary data with auto-detected `Content-Type`:
- `text/html` for HTML pages
- `application/pdf` for PDFs
- `image/jpeg`, `image/png`, etc. for images
- `application/zip` when `includeResources` is `true`

All responses include `Content-Disposition: attachment` headers.

## Execution

Save the output to a file with the appropriate extension:

```bash
[ -z "$BROWSERLESS_TOKEN" ] && [ -f ~/.browserless/.env ] && source ~/.browserless/.env
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/export?token=$BROWSERLESS_TOKEN" \
  -H "Content-Type: application/json" \
  -d '{"url": "https://example.com", "gotoOptions": {"waitUntil": ["networkidle0"]}}' \
  -o export-output
```

For offline archives with all assets:

```bash
curl -s -X POST "${BROWSERLESS_API_URL:-https://production-sfo.browserless.io}/export?token=$BROWSERLESS_TOKEN" \
  -H "Content-Type: application/json" \
  -d '{"url": "https://example.com", "includeResources": true}' \
  -o site-archive.zip
```

Tips:
- First inspect response headers (`curl -s -I ...`) to determine the content type and choose the right file extension.
- Use `includeResources: true` when the user wants an offline copy of a page.
- Use `gotoOptions.waitUntil: ["networkidle0"]` for pages with dynamic content.
"""
